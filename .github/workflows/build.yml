name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version info
        run: |
          {
            echo "HEAD: $(git rev-parse HEAD)"
            echo "tags: $(git --no-pager tag --points-at HEAD || true)"
            echo "branch: ${{ github.ref_name }}"
            echo "buildDate: $(date -u --iso-8601=seconds)"
          } > .version.txt
          tee cmd/globalping/.version.txt < .version.txt

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/internetworklab/cloudping:${{ matrix.suffix }}

  merge-server:
    runs-on: ubuntu-latest
    needs: build-server
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/internetworklab/cloudping"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:amd64" \
            "${IMAGE}:arm64"

          docker manifest annotate "${IMAGE}:latest" "${IMAGE}:amd64" --arch amd64
          docker manifest annotate "${IMAGE}:latest" "${IMAGE}:arm64" --arch arm64

          docker manifest push "${IMAGE}:latest"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker manifest create "${IMAGE}:${{ github.ref_name }}" \
              "${IMAGE}:amd64" \
              "${IMAGE}:arm64"

            docker manifest annotate "${IMAGE}:${{ github.ref_name }}" "${IMAGE}:amd64" --arch amd64
            docker manifest annotate "${IMAGE}:${{ github.ref_name }}" "${IMAGE}:arm64" --arch arm64

            docker manifest push "${IMAGE}:${{ github.ref_name }}"
          fi

      - name: Inspect image
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/internetworklab/cloudping:latest

  build-web:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version info
        run: |
          cd web
          {
            echo "HEAD: $(git rev-parse HEAD)"
            echo "tags: $(git --no-pager tag --points-at HEAD || true)"
            echo "branch: $(git rev-parse --abbrev-ref HEAD)"
            echo "buildDate: $(date -u --iso-8601=seconds)"
          } > .version.txt
          cat .version.txt

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./web
          platforms: ${{ matrix.platform }}
          push: true
          target: prod-caddy
          provenance: false
          tags: ${{ env.REGISTRY }}/internetworklab/cloudping-web:${{ matrix.suffix }}

  merge-web:
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/internetworklab/cloudping-web"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:amd64" \
            "${IMAGE}:arm64"

          docker manifest annotate "${IMAGE}:latest" "${IMAGE}:amd64" --arch amd64
          docker manifest annotate "${IMAGE}:latest" "${IMAGE}:arm64" --arch arm64

          docker manifest push "${IMAGE}:latest"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker manifest create "${IMAGE}:${{ github.ref_name }}" \
              "${IMAGE}:amd64" \
              "${IMAGE}:arm64"

            docker manifest annotate "${IMAGE}:${{ github.ref_name }}" "${IMAGE}:amd64" --arch amd64
            docker manifest annotate "${IMAGE}:${{ github.ref_name }}" "${IMAGE}:arm64" --arch arm64

            docker manifest push "${IMAGE}:${{ github.ref_name }}"
          fi

      - name: Inspect image
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/internetworklab/cloudping-web:latest
